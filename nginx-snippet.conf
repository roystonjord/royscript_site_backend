# Add this INSIDE your existing HTTPS `server { }` block for royscript.com.
# It proxies /api/* to the contact API on 127.0.0.1:3000.
# Because the API binds to 127.0.0.1, it is only reachable through Nginx.

location /api/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 5s;
    proxy_read_timeout    30s;
}

# After editing:  sudo nginx -t  &&  sudo systemctl reload nginx
